<!DOCTYPE html>
<html>
  <head>
    <title>CPIS 360 - WebAR Maker Assignment</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">

        <a-box 
          position="-1 0.5 0" 
          scale="0.5 0.5 0.5" 
          color="#4CC3D9">
        </a-box>

        <a-sphere 
          position="0 1.25 -1" 
          radius="0.5" 
          color="#EF2D5E"
          animation="property: position; to: 0 1.75 -1; dir: alternate; dur: 2000; loop: true">
        </a-sphere>

        <a-cylinder 
          position="1 0.75 0" 
          radius="0.5" 
          height="1.5" 
          color="#FFC65D"
          scale="0.5 0.5 0.5">
        </a-cylinder>

        <a-text 
          value="Mohammed Alsobeihy" 
          position="-1 2 0" 
          color="white" 
          width="5">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
